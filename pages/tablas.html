<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Ejemplo de tablas</h1>
    <table border="1" align="center" width="50%">
        <tr>
            <th>Nombre</th>
            <th>Curso</th>
            <th>Imagen</th>
            <th>Pasa Tiempos</th>
        </tr>
        <tr>
            <td>Juan</td>
            <td>3-H</td>
            <td><img src="../img/avatarhombre.png" alt="Avatar Hombre"></td>
            <td>
                <ul>
                    <li>Leer</li>
                    <li>Comer</li>
                </ul>
            </td>
        </tr>
        <tr>
            <td>Ana</td>
            <td>3-C</td>
            <td><img src="../img/avatarmujer.png" alt="Avatar Mujer"></td>
            <td>
                <ul>
                    <li>Cocinar</li>
                    <li>Cantar</li>
                </ul>
            </td>
        </tr>
    </table>
</body>
</html>
